# Kubernetes/OpenShift Deployment for Slack Worker
# =================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-worker
  labels:
    app: slack-worker
    component: scheduler
spec:
  # Can scale horizontally - file locks prevent duplicate execution
  replicas: 2
  selector:
    matchLabels:
      app: slack-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: slack-worker
        component: scheduler
    spec:
      containers:
      - name: slack-worker
        image: your-registry/slack-worker:latest
        imagePullPolicy: Always
        
        env:
        # Slack Configuration
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: slack-secrets
              key: bot-token
        - name: SLACK_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: slack-secrets
              key: app-token
        
        # ROTA Configuration
        - name: ROTA_GROUP_CHANNEL
          valueFrom:
            configMapKeyRef:
              name: slack-worker-config
              key: group-channel
        - name: ROTA_TEAM_LEADS
          valueFrom:
            configMapKeyRef:
              name: slack-worker-config
              key: team-leads
        - name: ROTA_TEAM_MEMBERS
          valueFrom:
            configMapKeyRef:
              name: slack-worker-config
              key: team-members
        
        # Google Sheets Configuration
        - name: ROTA_SERVICE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: gsheet-secrets
              key: service-account
        - name: ROTA_SHEET
          value: "ROTA"
        - name: ASSIGNMENT_WSHEET
          value: "Assignments"
        - name: ROTA_HISTORY_SHEET
          value: "ROTA_History"
        
        # Scheduling Configuration
        - name: TIMEZONE
          value: "America/New_York"
        - name: LOG_LEVEL
          value: "INFO"
        
        # Lock Configuration (critical for horizontal scaling)
        - name: LOCK_DIR
          value: "/app/locks"
        
        # Vault Configuration (if using Vault)
        - name: VAULT_ENABLED_FOR_DYNACONF
          value: "false"  # Set to "true" if using Vault
        
        volumeMounts:
        # Shared PVC for file locks (required for horizontal scaling)
        - name: lock-storage
          mountPath: /app/locks
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f slack_worker_main.py
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f slack_worker_main.py
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      
      volumes:
      # Shared PVC for lock files (required for multi-pod deployment)
      - name: lock-storage
        persistentVolumeClaim:
          claimName: slack-worker-locks
      
      restartPolicy: Always

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slack-worker-locks
spec:
  accessModes:
  - ReadWriteMany  # Required for multi-pod access
  resources:
    requests:
      storage: 1Gi
  # Use appropriate storage class for your cluster
  # storageClassName: nfs-client

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slack-worker-config
data:
  group-channel: "C123456789"  # Replace with actual channel ID
  team-leads: "Lead1,Lead2,Lead3"
  team-members: "Member1,Member2,Member3,Member4"

---
apiVersion: v1
kind: Secret
metadata:
  name: slack-secrets
type: Opaque
stringData:
  bot-token: "xoxb-your-bot-token"
  app-token: "xapp-your-app-token"

---
apiVersion: v1
kind: Secret
metadata:
  name: gsheet-secrets
type: Opaque
stringData:
  service-account: |
    {
      "type": "service_account",
      "project_id": "your-project",
      "private_key_id": "...",
      "private_key": "...",
      "client_email": "...",
      "client_id": "...",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "..."
    }

