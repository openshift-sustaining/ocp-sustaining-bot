# Docker Compose for Local Development
# =====================================
# This file is for local testing only

version: '3.8'

services:
  slack-worker:
    build:
      context: ..
      dockerfile: slack_worker/Dockerfile
    container_name: slack-worker
    environment:
      # Load from .env file
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - ROTA_GROUP_CHANNEL=${ROTA_GROUP_CHANNEL}
      - ROTA_TEAM_LEADS=${ROTA_TEAM_LEADS}
      - ROTA_TEAM_MEMBERS=${ROTA_TEAM_MEMBERS}
      - TIMEZONE=${TIMEZONE:-UTC}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOCK_DIR=/app/locks
    volumes:
      # Mount lock directory for persistence
      - lock-storage:/app/locks
      # Mount source for development (optional)
      # - ..:/app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lock-storage:
    driver: local

# Usage:
# 1. Create .env file with required variables
# 2. Run: docker-compose -f slack_worker/docker-compose.yml up -d
# 3. View logs: docker-compose -f slack_worker/docker-compose.yml logs -f
# 4. Stop: docker-compose -f slack_worker/docker-compose.yml down

